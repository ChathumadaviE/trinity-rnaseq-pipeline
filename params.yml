# Example parameters file for Trinity Nextflow pipeline
# Usage: nextflow run nextflow.nf -params-file params.yml

# Input/Output
reads: 'data/samples_{1,2}.fastq.gz'
outdir: './results'

# Trinity parameters
trinity_seqType: 'fq'
trinity_max_memory: '100G'
trinity_cpu: 32

# Trimmomatic parameters
trimmomatic_adapters: 'TruSeq3-PE.fa'
trimmomatic_options: 'ILLUMINACLIP:TruSeq3-PE.fa:2:30:10 LEADING:3 TRAILING:3 SLIDINGWINDOW:4:15 MINLEN:36'

# Bowtie2 parameters
bowtie2_threads: 8

# Salmon parameters
salmon_kmer: 31
salmon_libType: 'A'

# BUSCO parameters
busco_lineage: 'eukarya'

# TransDecoder parameters
transdecoder_min_prot_length: 100

# Resource limits
max_memory: '120.GB'
max_cpus: 32
max_time: '48.h'

# Nextflow settings
publish_dir_mode: 'copy'
